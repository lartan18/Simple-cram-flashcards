<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard App - Cram Mode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="appSection" class="app-section">
    <h1 id="appTitle" class="app-title">Loading...</h1>
    <div id="loadError" class="error-msg"></div>

    <div class="toolbar">
      <label for="deckSelect" class="sr-only">Choose deck</label>
      <select id="deckSelect" class="deck-select" aria-label="Choose deck">
        <optgroup label="Weekly Flashcards">
          <option value="./week-1.txt">Week 1</option>
          <option value="./week-2.txt">Week 2</option>
          <option value="./week-3.txt">Week 3</option>
          <option value="./week-4.txt">Week 4</option>
          <option value="./week-5.txt">Week 5</option>
          <option value="./week-6.txt">Week 6</option>
          <option value="./week-7.txt">Week 7</option>
          <option value="./week-8.txt">Week 8</option>
          <option value="./week-9.txt">Week 9</option>
          <option value="./week-10.txt">Week 10</option>
          <option value="./week-11.txt">Week 11</option>
        </optgroup>
        <optgroup label="Exam Questions">
          <option value="./exam-questions-1.txt">Exam Questions 1</option>
          <option value="./exam-questions-2.txt">Exam Questions 2</option>
          <option value="./exam-questions-3.txt">Exam Questions 3</option>
          <option value="./exam-questions-4.txt">Exam Questions 4</option>
          <option value="./exam-questions-5.txt">Exam Questions 5</option>
          <option value="./exam-questions-6.txt">Exam Questions 6</option>
          <option value="./exam-questions-7.txt">Exam Questions 7</option>
          <option value="./exam-questions-8.txt">Exam Questions 8</option>
          <option value="./exam-questions-9.txt">Exam Questions 9</option>
          <option value="./exam-questions-10.txt">Exam Questions 10</option>
          <option value="./exam-questions-11.txt">Exam Questions 11</option>
        </optgroup>
      </select>
      <button id="shuffleBtn" class="icon-btn" title="Shuffle rounds" aria-label="Shuffle rounds">Shuffle</button>
      <button id="removeBtn" class="icon-btn" title="Remove from session" aria-label="Remove from session">Remove</button>
    </div>

    <div class="card-row">
      <!-- Flashcard Display -->
      <div class="flashcard-container">
        <div id="flashcard" class="flashcard">
          <div id="cardContent" class="card-content">Loading...</div>
          <div class="card-meta">
            <span id="cardCounter">Card 1 of 0</span>
          </div>
        </div>
      </div>

      <!-- Progress Visualizer -->
      <aside class="progress-pane">
        <h2>Progress</h2>
        <div id="progressBar" class="progress-bar"></div>
      </aside>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="controls-row">
        <button id="wrongBtn" class="control-btn wrong-btn" disabled>Wrong</button>
        <button id="flipBtn" class="control-btn">Flip card</button>
        <button id="correctBtn" class="control-btn correct-btn" disabled>Correct</button>
      </div>
    </div>
  </div>

<script src="flashcardEngine.js"></script>
<script src="app.js"></script>
</body>
</html>
